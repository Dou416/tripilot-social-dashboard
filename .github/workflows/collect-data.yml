name: Collect Social Data

on:
  schedule:
    # 03:00 Asia/Shanghai = 19:00 UTC (previous day)
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser for TikTok
        run: |
          python -m playwright install --with-deps chromium

      - name: Create .env from GitHub Secrets
        run: |
          cat > .env << EOF
          TWITTER_USERNAME=${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD=${{ secrets.TWITTER_PASSWORD }}
          TWITTER_EMAIL=${{ secrets.TWITTER_EMAIL }}
          TIKTOK_MS_TOKEN=${{ secrets.TIKTOK_MS_TOKEN }}
          XHS_COOKIE=${{ secrets.XHS_COOKIE }}
          INSTAGRAM_USERNAME=${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD=${{ secrets.INSTAGRAM_PASSWORD }}
          EOF

      - name: Run collector
        id: collector
        env:
          DISABLE_REDDIT: "true"
        run: |
          set +e
          python collector.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            echo "Collector exited with code $code. Skipping commit."
          fi
          exit 0

      - name: Commit updated data
        id: commit
        if: steps.collector.outputs.exit_code == '0'
        run: |
          if git diff --quiet -- data/social_data.json; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/social_data.json
          git commit -m "chore: update collected social data"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy-pages:
    needs: collect-and-push
    if: always() && needs.collect-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
